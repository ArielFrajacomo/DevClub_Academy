    <h1>Installing React</h1>
    <h2>Installing Globally</h2>
    <ol>
        <li>Open Windows PowerShell</li>
        <li>Run the following command to install React globally:
            <code class="copyThisToClipboard">npm install --global yarn</code>
            <blockquote>Only needed once, if you don't have Yarn installed</blockquote>
            <p>Verify the installation by running:
            <code class="copyThisToClipboard">yarn --version</code>
        </p>
        </li>
        

    </ol>
